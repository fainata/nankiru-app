var audioContext = null;
var soundBuffers = {};
var audioReady = false;
var audioLoading = false;

var soundFiles = {
  soundQuestion: "sounds/question.mp3",
  soundTsumo: "sounds/tsumo.mp3",
  soundCorrect: "sounds/correct.mp3",
  soundWrong: "sounds/wrong.mp3",

};

function unlockAudioContext(){
  if(!audioContext){
    return;
  }

  if(audioContext.state === "suspended"){
    audioContext.resume();
  }

  var buffer = audioContext.createBuffer(1, 1, 22050);
  var source = audioContext.createBufferSource();

  source.buffer = buffer;
  source.connect(audioContext.destination);

  try{
    source.start(0);
  }catch(error){
    // 何もしない
  }
}

function initAudio(callback){
  if(audioReady === true){
    if(callback){
      callback();
    }
    return;
  }

  if(audioLoading === true){
    return;
  }

  audioLoading = true;

  var AudioContextClass = window.AudioContext || window.webkitAudioContext;
  audioContext = new AudioContextClass();

  if(audioContext.state === "suspended"){
    audioContext.resume();
  }
  
  unlockAudioContext();

  var names = [
    "soundQuestion",
    "soundTsumo",
    "soundCorrect",
    "soundWrong",
    "soundTimeout"
  ];

  var loadedCount = 0;

  for(var i = 0; i < names.length; i++){
    loadSound(names[i], function(){
      loadedCount++;

      if(loadedCount === names.length){
        audioReady = true;
        audioLoading = false;

        if(callback){
          callback();
        }
      }
    });
  }
}

function loadSound(name, callback){
  fetch(soundFiles[name])
    .then(function(response){
      return response.arrayBuffer();
    })
    .then(function(arrayBuffer){
      audioContext.decodeAudioData(arrayBuffer, function(buffer){
        soundBuffers[name] = buffer;
        callback();
      });
    })
    .catch(function(error){
      audioLoading = false;
      console.log(name + " の読み込みに失敗");
    });
}

function playSound(soundId){
  if(audioReady === false){
    return;
  }

  if(!audioContext){
    return;
  }

  if(!soundBuffers[soundId]){
    return;
  }

  function startSound(){
    var source = audioContext.createBufferSource();
    var gain = audioContext.createGain();

    source.buffer = soundBuffers[soundId];

    if(soundId === "soundWrong"){
      gain.gain.value = 1.2;
    }else{
      gain.gain.value = 0.8;
    }

    source.connect(gain);
    gain.connect(audioContext.destination);

    source.start(0);
  }

  if(audioContext.state === "suspended"){
    audioContext.resume().then(function(){
      startSound();
    }).catch(function(error){
      // 何もしない
    });
  }else{
    startSound();
  }
}

function selectMode(seconds){
  selectedMode = seconds;

  document.getElementById("mode3").className = "modeButton";
  document.getElementById("mode5").className = "modeButton";
  document.getElementById("mode0").className = "modeButton";

  if(seconds === 3){
    document.getElementById("selectedModeText").innerHTML = "3秒モードを選択中";
    document.getElementById("mode3").className = "modeButton selected";
  }else if(seconds === 5){
    document.getElementById("selectedModeText").innerHTML = "5秒モードを選択中";
    document.getElementById("mode5").className = "modeButton selected";
  }else{
    document.getElementById("selectedModeText").innerHTML = "無制限モードを選択中";
    document.getElementById("mode0").className = "modeButton selected";
  }
}

function startApp(){
  if(selectedMode === null){
    document.getElementById("selectedModeText").innerHTML =
      "先にモードを選んでください。";
    return;
  }

  var startButton = document.getElementById("startButton");
  startButton.innerHTML = "読み込み中...";
  startButton.disabled = true;

  initAudio(function(){
    startButton.innerHTML = "スタート";
    startButton.disabled = false;

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";
	document.body.className = "gameMode";

    chooseRandomQuestion();
  });
}

function chooseRandomQuestion(){

  var nextQuestion;

  if(questions.length === 1){
    nextQuestion = 0;
  }else{
    do{
      nextQuestion = Math.floor(Math.random() * questions.length);
    }while(nextQuestion === currentQuestion);
  }

  currentQuestion = nextQuestion;
  showQuestion();

  if(selectedMode !== null){
    startGame(selectedMode);
  }
}

  return comment.replace(/\{((?:[1-9][mps]|[1-7]z)+)\}/g, function(match, tilesText){
    var tiles = tilesText.match(/([1-9][mps]|[1-7]z)/g);
    var html = "";

    if(!tiles){
      return match;
    }

    for(var i = 0; i < tiles.length; i++){
      var convertedTile = convertTileSuit(tiles[i], suitMap);
      html += getTileHtml(convertedTile, 22);
    }

    return html;
  });
}

function makeSuitMap(){
  var patterns = [
    { m: "m", p: "p", s: "s" },
    { m: "m", p: "s", s: "p" },
    { m: "p", p: "m", s: "s" },
    { m: "p", p: "s", s: "m" },
    { m: "s", p: "m", s: "p" },
    { m: "s", p: "p", s: "m" }
  ];

  return patterns[Math.floor(Math.random() * patterns.length)];
}

function convertTileSuit(tile, suitMap){
  var number = tile.substring(0, 1);
  var suit = tile.substring(1, 2);

  if(suit === "m" || suit === "p" || suit === "s"){
    return number + suitMap[suit];
  }

  return tile;
}

function convertTileList(tileList, suitMap){
  var newList = [];

  for(var i = 0; i < tileList.length; i++){
    newList.push(convertTileSuit(tileList[i], suitMap));
  }

  return newList;
}

function convertUkeire(ukeire, suitMap){
  if(!ukeire){
    return "";
  }

  var html = '<span style="margin-left:20px;">：';

  for(var i = 0; i < ukeire.length; i++){
    var convertedTile = convertTileSuit(ukeire[i].tile, suitMap);

    html += getTileHtml(convertedTile, 22);
    html += ukeire[i].count + "枚 ";

    if(i < ukeire.length - 1){
      html += " / ";
    }
  }

  html += "</span>";

  return html;
}

function shuffleSuitBlocks(hand){
  var blocks = {
    m: [],
    p: [],
    s: [],
    z: []
  };

  for(var i = 0; i < hand.length; i++){
    var tile = hand[i];
    var suit = tile.substring(1, 2);

    if(suit === "m" || suit === "p" || suit === "s"){
      blocks[suit].push(tile);
    }else{
      blocks.z.push(tile);
    }
  }

  var orders = [
    ["m", "p", "s"],
    ["m", "s", "p"],
    ["p", "m", "s"],
    ["p", "s", "m"],
    ["s", "m", "p"],
    ["s", "p", "m"]
  ];

  var order = orders[Math.floor(Math.random() * orders.length)];

  var newHand = [];

  for(var j = 0; j < order.length; j++){
    var suitName = order[j];

    for(var k = 0; k < blocks[suitName].length; k++){
      newHand.push(blocks[suitName][k]);
    }
  }

  for(var z = 0; z < blocks.z.length; z++){
    newHand.push(blocks.z[z]);
  }

  return newHand;
}

function showQuestion(){
  var q = questions[currentQuestion];

  var suitMap = makeSuitMap();
  renderRoundInfo(q, suitMap);

  var tsumoIndex = Math.floor(Math.random() * q.hand.length);
  var originalTsumo = q.hand[tsumoIndex];

  var originalHand = [];

  for(var t = 0; t < q.hand.length; t++){
    if(t !== tsumoIndex){
      originalHand.push(q.hand[t]);
    }
  }

  var displayHand = convertTileList(originalHand, suitMap);
  displayHand = shuffleSuitBlocks(displayHand);

  currentDisplayTsumo = convertTileSuit(originalTsumo, suitMap);

  currentCorrect = convertTileList(q.correct, suitMap);
  currentOk = convertTileList(q.ok, suitMap);
  currentComment = convertComment(q.comment, suitMap);
  currentUkeireHtml = convertUkeire(q.ukeire, suitMap);

  document.getElementById("questionTitle").innerHTML = q.title;
  document.getElementById("result").innerHTML = "";
  document.getElementById("timer").innerHTML = "-";
  document.getElementById("nextButton").style.display = "none";

  answered = false;
  canAnswer = false;

  var handArea = document.getElementById("hand");
  handArea.innerHTML = "";

  for(var i = 0; i < displayHand.length; i++){
    var tile = displayHand[i];

    var img = document.createElement("img");
    img.src = tileImages[tile];
    img.style.margin = "3px";
    img.style.width = "38px";
    img.style.verticalAlign = "top";
    img.style.opacity = "0.9";

    img.onclick = (function(selectedTile){
      return function(){
        answer(selectedTile);
      };
    })(tile);

    handArea.appendChild(img);
  }

 // var waitingText = document.createElement("span");
 // waitingText.id = "waitingText";
 // waitingText.innerHTML = "<br>ツモ待ち...";
 // handArea.appendChild(waitingText);
  playSound("soundQuestion");
}

function revealTsumoAndStartTimer(){
  playSound("soundTsumo");
  
  var handArea = document.getElementById("hand");

  var waitingText = document.getElementById("waitingText");
  if(waitingText){
    waitingText.innerHTML = "";
  }

  var space = document.createElement("span");
  space.innerHTML = "&nbsp;&nbsp;&nbsp;";
  handArea.appendChild(space);

  var tsumoImg = document.createElement("img");
  tsumoImg.src = tileImages[currentDisplayTsumo];
  tsumoImg.style.margin = "3px";
  tsumoImg.style.width = "38px";
  tsumoImg.style.verticalAlign = "top";
  //tsumoImg.style.border = "2px solid red";

  tsumoImg.onclick = function(){
    answer(currentDisplayTsumo);
  };

  handArea.appendChild(tsumoImg);

  var imgs = handArea.getElementsByTagName("img");

  for(var i = 0; i < imgs.length; i++){
    imgs[i].style.opacity = "1";
    imgs[i].style.cursor = "pointer";
  }

  canAnswer = true;

  if(selectedMode === 0){
    document.getElementById("timer").innerHTML = "無制限";
    return;
  }

  timeLeft = selectedMode;
  document.getElementById("timer").innerHTML = timeLeft + "秒";

  timerId = setInterval(function(){
    timeLeft = timeLeft - 1;
    document.getElementById("timer").innerHTML = timeLeft + "秒";

  if(timeLeft <= 0 && answered === false){
   answered = true;
   canAnswer = false;
   clearInterval(timerId);

   playSound("soundTimeout");

   document.getElementById("result").innerHTML =
    "時間切れ！" + currentUkeireHtml + "<br><br>" +
    "正解：<br>" +
    currentComment;
	
	document.getElementById("nextButton").style.display = "inline-block";
}
  }, 1000);
}

function startGame(seconds){
  selectedMode = seconds;

  if(timerId !== null){
    clearInterval(timerId);
  }

  if(revealTimerId !== null){
    clearTimeout(revealTimerId);
  }

  answered = false;
  canAnswer = false;

  document.getElementById("result").innerHTML = "";
  document.getElementById("timer").innerHTML = "-";

  revealTimerId = setTimeout(function(){
  revealTsumoAndStartTimer();
}, 1000);
}

  }

    return;
  }

  if(answered === true){
    return;
  }

  answered = true;

  if(timerId !== null){
    clearInterval(timerId);
  }

  var q = questions[currentQuestion];

if(currentCorrect.indexOf(tile) !== -1){

  playSound("soundCorrect");

  document.getElementById("result").innerHTML =
   "◎ 正解！" + currentUkeireHtml + "<br><br>" + currentComment;

}else if(currentOk && currentOk.indexOf(tile) !== -1){

  playSound("soundCorrect");

  document.getElementById("result").innerHTML =
   "○ 及第点！" + currentUkeireHtml + "<br><br>" + currentComment;

}else{

    "× 不正解" + currentUkeireHtml + "<br><br>" + currentComment;

}

document.getElementById("nextButton").style.display = "inline-block";

}

function nextQuestion(){
  if(timerId !== null){
    clearInterval(timerId);
  }

  if(revealTimerId !== null){
    clearTimeout(revealTimerId);
  }

  canAnswer = false;

}

    clearInterval(timerId);
    timerId = null;
  }

  if(revealTimerId !== null){
    clearTimeout(revealTimerId);
    revealTimerId = null;
  }

  document.getElementById("roundInfo").innerHTML = "";

  document.getElementById("result").innerHTML = "";

  document.getElementById("nextButton").style.display = "none";

  selectedMode = null;
  document.getElementById("selectedModeText").innerHTML = "モード未選択";
}
